<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI連載物語 - 最新話</title>
  <style>
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 30px 20px;
      line-height: 2.0;
      color: #2c2c2c;
      background: #fdf9f3;
    }
    .work-title { text-align: center; font-size: 1.05em; color: #5a3e1b; margin: 0 0 2px; }
    .work-title a { color: inherit; text-decoration: none; }
    .work-title a:hover { text-decoration: underline; }
    .episode { text-align: center; color: #c8a96e; font-size: 0.9em; margin: 0 0 4px; }
    h1.episode-title { font-size: 1.4em; text-align: center; border-bottom: 2px solid #c8a96e; padding-bottom: 10px; color: #5a3e1b; }
    .date { color: #999; font-size: 0.85em; margin-bottom: 20px; text-align: center; }
    .story { white-space: pre-wrap; font-size: 1.05em; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .nav { margin-top: 24px; text-align: center; font-size: 0.9em; }
    .nav a { color: #c8a96e; text-decoration: none; margin: 0 10px; }
    .nav a:hover { text-decoration: underline; }
    rt { font-size: 0.55em; color: #666; }
    .empty { color: #999; text-align: center; }
  </style>
</head>
<body>
  <div id="latest"></div>

  <script>
    // 青空文庫風ルビ（親文字《よみ》／｜親文字《よみ》）を <ruby> に変換して安全に描画する。
    // すべてのテキストは createTextNode / textContent 経由なのでHTMLとして解釈されない。
    function renderStory(container, text) {
      var KANJI = '一-鿿々-〇ヶ'; // 漢字 + 々〆〇ヶ
      var re = new RegExp(
        '｜([^｜《》]+)《([^《》]+)》' + // ｜親文字《よみ》
        '|([' + KANJI + ']+)《([^《》]+)》',            // 漢字列《よみ》
        'g'
      );
      var last = 0, m;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) {
          container.appendChild(document.createTextNode(text.slice(last, m.index)));
        }
        var base = m[1] !== undefined ? m[1] : m[3];
        var reading = m[2] !== undefined ? m[2] : m[4];
        var ruby = document.createElement('ruby');
        ruby.appendChild(document.createTextNode(base));
        var rt = document.createElement('rt');
        rt.textContent = reading;
        ruby.appendChild(rt);
        container.appendChild(ruby);
        last = re.lastIndex;
      }
      if (last < text.length) {
        container.appendChild(document.createTextNode(text.slice(last)));
      }
    }

    var TOTAL_EPISODES = 5;

    Promise.all([
      fetch('bible.json', { cache: 'no-store' }).then(function (r) { return r.json(); }).catch(function () { return {}; }),
      fetch('stories.json', { cache: 'no-store' }).then(function (r) { return r.json(); }),
      fetch('library.json', { cache: 'no-store' }).then(function (r) { return r.json(); }).catch(function () { return []; })
    ])
      .then(function (results) {
        var bible = results[0] || {};
        var stories = results[1] || [];
        var library = results[2] || [];
        var latest = document.getElementById('latest');

        if (!stories.length) {
          latest.innerHTML = '<p class="empty">まだ物語がありません。次の月曜をお待ちください。</p>';
          return;
        }

        var workTitle = bible.work_title || '無題の物語';
        var s = stories[stories.length - 1];          // 最新話
        var workUrl = 'work.html?work=' + library.length;   // 連載中の作品ページ
        document.title = workTitle + ' - 第' + s.episode + '話';

        var wt = document.createElement('p');
        wt.className = 'work-title';
        var wa = document.createElement('a');
        wa.href = workUrl;
        wa.textContent = '『' + workTitle + '』';
        wt.appendChild(wa);

        var ep = document.createElement('p');
        ep.className = 'episode';
        ep.textContent = '第' + s.episode + '話 ／ 全' + TOTAL_EPISODES + '話'
          + (s.episode >= TOTAL_EPISODES ? '（完結）' : '');

        var h1 = document.createElement('h1');
        h1.className = 'episode-title';
        h1.textContent = '📖 ' + s.title;

        var date = document.createElement('p');
        date.className = 'date';
        date.textContent = '📅 更新日：' + s.date;

        var story = document.createElement('div');
        story.className = 'story';
        renderStory(story, s.body);        // ルビを <ruby> に変換して安全に描画

        var nav = document.createElement('p');
        nav.className = 'nav';
        var a1 = document.createElement('a');
        a1.href = workUrl;
        a1.textContent = 'この作品を最初から読む';
        var a2 = document.createElement('a');
        a2.href = 'index.html';
        a2.textContent = '作品一覧';
        nav.append(a1, a2);

        latest.append(wt, ep, h1, date, story, nav);
      })
      .catch(function () {
        document.getElementById('latest').innerHTML =
          '<p class="empty">読み込みに失敗しました。</p>';
      });
  </script>
</body>
</html>
