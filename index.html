<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI連載物語</title>
  <link rel="alternate" type="application/rss+xml" title="AI連載物語" href="rss.xml">
  <style>
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 30px 20px;
      line-height: 2.0;
      color: #2c2c2c;
      background: #fdf9f3;
    }
    .site-header { text-align: center; margin-bottom: 28px; }
    .series-label { color: #c8a96e; font-size: 0.8em; letter-spacing: 0.12em; margin: 0 0 6px; }
    h1 { font-size: 1.8em; color: #5a3e1b; margin: 0; }
    h2.episode-title { font-size: 1.3em; border-bottom: 2px solid #c8a96e; padding-bottom: 10px; color: #5a3e1b; }
    .episode { color: #c8a96e; font-size: 0.9em; margin-bottom: 4px; }
    .date { color: #999; font-size: 0.85em; margin-bottom: 24px; }
    .story { white-space: pre-wrap; font-size: 1.05em; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .archive { margin-top: 40px; }
    .archive h2 { font-size: 1.1em; color: #5a3e1b; }
    details { margin-top: 12px; background: #fff; border-radius: 6px; padding: 12px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    summary { cursor: pointer; font-weight: bold; color: #5a3e1b; }
    .past-body { white-space: pre-wrap; margin-top: 12px; font-size: 0.95em; }
    rt { font-size: 0.55em; color: #666; }
    .rss { font-size: 0.8em; color: #c8a96e; text-decoration: none; margin-left: 8px; }
    .empty { color: #999; }
  </style>
</head>
<body>
  <header class="site-header" id="site-header" hidden>
    <p class="series-label">📜 全5話完結の連載小説</p>
    <h1 id="work-title"></h1>
  </header>

  <div id="latest"></div>

  <div class="archive">
    <h2>📚 バックナンバー <a class="rss" href="rss.xml">RSS</a></h2>
    <div id="archive"></div>
  </div>

  <script>
    // 青空文庫風ルビ（親文字《よみ》／｜親文字《よみ》）を <ruby> に変換して安全に描画する。
    // すべてのテキストは createTextNode / textContent 経由なのでHTMLとして解釈されない。
    function renderStory(container, text) {
      var KANJI = '一-鿿々-〇ヶ'; // 漢字 + 々〆〇ヶ
      var re = new RegExp(
        '｜([^｜《》]+)《([^《》]+)》' + // ｜親文字《よみ》
        '|([' + KANJI + ']+)《([^《》]+)》',            // 漢字列《よみ》
        'g'
      );
      var last = 0, m;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) {
          container.appendChild(document.createTextNode(text.slice(last, m.index)));
        }
        var base = m[1] !== undefined ? m[1] : m[3];
        var reading = m[2] !== undefined ? m[2] : m[4];
        var ruby = document.createElement('ruby');
        ruby.appendChild(document.createTextNode(base));
        var rt = document.createElement('rt');
        rt.textContent = reading;
        ruby.appendChild(rt);
        container.appendChild(ruby);
        last = re.lastIndex;
      }
      if (last < text.length) {
        container.appendChild(document.createTextNode(text.slice(last)));
      }
    }

    var TOTAL_EPISODES = 5;

    Promise.all([
      fetch('bible.json', { cache: 'no-store' }).then(function (r) { return r.json(); }).catch(function () { return {}; }),
      fetch('stories.json', { cache: 'no-store' }).then(function (r) { return r.json(); })
    ])
      .then(function (results) {
        var bible = results[0] || {};
        var stories = results[1];

        // 作品全体のタイトルをヘッダーに表示
        if (bible.work_title) {
          document.title = bible.work_title;
          document.getElementById('work-title').textContent = bible.work_title;
          document.getElementById('site-header').hidden = false;
        }

        var latest = document.getElementById('latest');
        if (!stories.length) {
          latest.innerHTML = '<p class="empty">まだ物語がありません。次の月曜をお待ちください。</p>';
          return;
        }

        var s = stories[stories.length - 1];
        var ep = document.createElement('p');
        ep.className = 'episode';
        ep.textContent = '第' + s.episode + '話 ／ 全' + TOTAL_EPISODES + '話'
          + (s.episode >= TOTAL_EPISODES ? '（完結）' : '');
        var h1 = document.createElement('h2');
        h1.className = 'episode-title';
        h1.textContent = '📖 ' + s.title;
        var date = document.createElement('p');
        date.className = 'date';
        date.textContent = '📅 更新日：' + s.date;
        var story = document.createElement('div');
        story.className = 'story';
        renderStory(story, s.body);        // ルビを <ruby> に変換して安全に描画
        latest.append(ep, h1, date, story);

        var archive = document.getElementById('archive');
        stories.slice(0, -1).reverse().forEach(function (p) {
          var d = document.createElement('details');
          d.id = 'ep' + p.episode;
          var sm = document.createElement('summary');
          sm.textContent = '第' + p.episode + '話｜' + p.title + '（' + p.date + '）';
          var b = document.createElement('div');
          b.className = 'past-body';
          renderStory(b, p.body);
          d.append(sm, b);
          archive.append(d);
        });
      })
      .catch(function () {
        document.getElementById('latest').innerHTML =
          '<p class="empty">読み込みに失敗しました。</p>';
      });
  </script>
</body>
</html>
