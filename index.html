<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI連載物語</title>
  <link rel="alternate" type="application/rss+xml" title="AI連載物語" href="rss.xml">
  <style>
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 30px 20px;
      line-height: 1.8;
      color: #2c2c2c;
      background: #fdf9f3;
    }
    header.home { text-align: center; margin-bottom: 24px; }
    header.home h1 { font-size: 1.8em; color: #5a3e1b; margin: 0 0 6px; }
    .tagline { color: #c8a96e; font-size: 0.85em; margin: 0; }
    .rss { font-size: 0.8em; color: #c8a96e; text-decoration: none; margin-left: 6px; }
    h2.section-title { font-size: 1.1em; color: #5a3e1b; border-bottom: 2px solid #c8a96e; padding-bottom: 6px; margin-top: 36px; }
    .card {
      display: block; text-decoration: none; color: inherit;
      background: #fff; border-radius: 8px; padding: 18px 20px; margin-top: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform .08s ease, box-shadow .08s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.10); }
    .card .title { font-size: 1.15em; font-weight: bold; color: #5a3e1b; }
    .card .meta { color: #999; font-size: 0.85em; margin-top: 4px; }
    .badge { display: inline-block; font-size: 0.72em; padding: 2px 8px; border-radius: 10px; background: #c8a96e; color: #fff; margin-left: 8px; vertical-align: middle; }
    .badge.done { background: #7a9e6e; }
    .empty { color: #999; }
  </style>
</head>
<body>
  <header class="home">
    <h1>📚 AI連載物語</h1>
    <p class="tagline">AIが毎週月曜に紡ぐ、全5話完結の物語<a class="rss" href="rss.xml">RSS</a></p>
  </header>

  <section>
    <h2 class="section-title">連載中</h2>
    <div id="current"></div>
  </section>

  <section id="completed-section" hidden>
    <h2 class="section-title">完結した作品</h2>
    <div id="completed"></div>
  </section>

  <script src="render.js"></script>
  <script>
    var TOTAL_EPISODES = 5;

    function fetchJson(path) {
      return fetch(path, { cache: 'no-store' }).then(function (r) {
        if (!r.ok) throw new Error(path + ': HTTP ' + r.status);
        return r.json();
      });
    }

    // 作品カード（リンク）を生成する。タイトルは renderRuby でルビ変換（XSS安全）。
    function makeCard(href, title, meta, done) {
      var a = document.createElement('a');
      a.className = 'card';
      a.href = href;
      var t = document.createElement('div');
      t.className = 'title';
      t.appendChild(document.createTextNode('『'));
      renderRuby(t, title);
      t.appendChild(document.createTextNode('』'));
      if (done) {
        var badge = document.createElement('span');
        badge.className = 'badge done';
        badge.textContent = '完結';
        t.appendChild(badge);
      }
      var m = document.createElement('div');
      m.className = 'meta';
      m.textContent = meta;
      a.append(t, m);
      return a;
    }

    Promise.all([
      fetchJson('bible.json'),
      fetchJson('stories.json'),
      fetchJson('library.json')
    ])
      .then(function (results) {
        var bible = results[0] || {};
        var stories = results[1] || [];
        var library = results[2] || [];

        // 連載中の作品
        var current = document.getElementById('current');
        if (stories.length) {
          var done = stories.length >= TOTAL_EPISODES;
          var meta = done
            ? ('全' + TOTAL_EPISODES + '話・完結')
            : ('第' + stories.length + '話まで公開 ／ 全' + TOTAL_EPISODES + '話');
          // 連載中の作品の安定インデックスは「完結済み作品数」（= library.length）。
          current.appendChild(makeCard('work.html?work=' + library.length, bible.work_title || '無題の物語', meta, done));
        } else {
          current.innerHTML = '<p class="empty">まだ物語がありません。次の月曜をお待ちください。</p>';
        }

        // 完結した作品（新しい順に表示。リンクは library 内の元インデックスを使う）
        if (library.length) {
          var box = document.getElementById('completed');
          var indexed = library.map(function (w, i) { return { work: w, index: i }; });
          indexed.reverse().forEach(function (o) {
            var epCount = o.work.episodes ? o.work.episodes.length : 0;
            var meta = '全' + epCount + '話'
              + (o.work.completed ? '・' + o.work.completed + ' 完結' : '');
            box.appendChild(makeCard('work.html?work=' + o.index, o.work.work_title, meta, true));
          });
          document.getElementById('completed-section').hidden = false;
        }
      })
      .catch(function () {
        document.getElementById('current').innerHTML =
          '<p class="empty">読み込みに失敗しました。</p>';
      });
  </script>
</body>
</html>
