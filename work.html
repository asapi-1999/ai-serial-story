<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI連載物語</title>
  <style>
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 30px 20px;
      line-height: 2.0;
      color: #2c2c2c;
      background: #fdf9f3;
    }
    .back { display: inline-block; color: #c8a96e; text-decoration: none; font-size: 0.9em; margin-bottom: 16px; }
    .back:hover { text-decoration: underline; }
    header.work { text-align: center; margin-bottom: 4px; }
    .series-label { color: #c8a96e; font-size: 0.8em; letter-spacing: 0.12em; margin: 0 0 6px; }
    h1.work-title { font-size: 1.8em; color: #5a3e1b; margin: 0; }
    .work-status { text-align: center; color: #999; font-size: 0.85em; margin: 6px 0 28px; }
    .episode-block { margin-bottom: 40px; }
    .episode { color: #c8a96e; font-size: 0.9em; margin-bottom: 4px; }
    h2.episode-title { font-size: 1.3em; border-bottom: 2px solid #c8a96e; padding-bottom: 8px; color: #5a3e1b; }
    .date { color: #999; font-size: 0.85em; margin-bottom: 14px; }
    .story { white-space: pre-wrap; font-size: 1.05em; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    rt { font-size: 0.55em; color: #666; }
    .empty { color: #999; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← 作品一覧へ</a>
  <header class="work">
    <p class="series-label">📜 全5話完結の連載小説</p>
    <h1 class="work-title" id="work-title"></h1>
  </header>
  <p class="work-status" id="work-status"></p>
  <div id="episodes"></div>

  <script>
    // 青空文庫風ルビ（親文字《よみ》／｜親文字《よみ》）を <ruby> に変換して安全に描画する。
    // すべてのテキストは createTextNode / textContent 経由なのでHTMLとして解釈されない。
    function renderStory(container, text) {
      var KANJI = '一-鿿々-〇ヶ'; // 漢字 + 々〆〇ヶ
      var re = new RegExp(
        '｜([^｜《》]+)《([^《》]+)》' + // ｜親文字《よみ》
        '|([' + KANJI + ']+)《([^《》]+)》',            // 漢字列《よみ》
        'g'
      );
      var last = 0, m;
      while ((m = re.exec(text)) !== null) {
        if (m.index > last) {
          container.appendChild(document.createTextNode(text.slice(last, m.index)));
        }
        var base = m[1] !== undefined ? m[1] : m[3];
        var reading = m[2] !== undefined ? m[2] : m[4];
        var ruby = document.createElement('ruby');
        ruby.appendChild(document.createTextNode(base));
        var rt = document.createElement('rt');
        rt.textContent = reading;
        ruby.appendChild(rt);
        container.appendChild(ruby);
        last = re.lastIndex;
      }
      if (last < text.length) {
        container.appendChild(document.createTextNode(text.slice(last)));
      }
    }

    var TOTAL_EPISODES = 5;

    function getParam(name) {
      var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
      return m ? decodeURIComponent(m[1]) : null;
    }

    var w = getParam('w');
    if (w === null || w === '') { w = 'current'; }

    var dataPromise;
    if (w === 'current') {
      // 連載中の作品：bible.json（タイトル）と stories.json（各話）から構成
      dataPromise = Promise.all([
        fetch('bible.json', { cache: 'no-store' }).then(function (r) { return r.json(); }).catch(function () { return {}; }),
        fetch('stories.json', { cache: 'no-store' }).then(function (r) { return r.json(); })
      ]).then(function (res) {
        return { title: (res[0] || {}).work_title || '無題の物語', episodes: res[1] || [] };
      });
    } else {
      // 完結作品：library.json の該当インデックス
      dataPromise = fetch('library.json', { cache: 'no-store' })
        .then(function (r) { return r.json(); })
        .then(function (lib) {
          var idx = parseInt(w, 10);
          var work = (lib || [])[idx];
          if (!work) { return null; }
          return { title: work.work_title, episodes: work.episodes || [] };
        });
    }

    dataPromise
      .then(function (data) {
        if (!data || !data.episodes.length) {
          document.getElementById('work-status').innerHTML =
            '<span class="empty">作品が見つかりませんでした。</span>';
          return;
        }

        document.title = data.title;
        document.getElementById('work-title').textContent = data.title;
        var done = data.episodes.length >= TOTAL_EPISODES;
        document.getElementById('work-status').textContent =
          '全' + TOTAL_EPISODES + '話' + (done ? '・完結' : '（第' + data.episodes.length + '話まで公開中）');

        var box = document.getElementById('episodes');
        data.episodes.forEach(function (p) {
          var blk = document.createElement('div');
          blk.className = 'episode-block';
          blk.id = 'ep' + p.episode;
          var ep = document.createElement('p');
          ep.className = 'episode';
          ep.textContent = '第' + p.episode + '話';
          var h = document.createElement('h2');
          h.className = 'episode-title';
          h.textContent = '📖 ' + p.title;
          var d = document.createElement('p');
          d.className = 'date';
          d.textContent = '📅 ' + p.date;
          var st = document.createElement('div');
          st.className = 'story';
          renderStory(st, p.body);        // ルビを <ruby> に変換して安全に描画
          blk.append(ep, h, d, st);
          box.appendChild(blk);
        });

        // ?w=...#epN で来た場合は該当話までスクロール
        if (location.hash) {
          var el = document.getElementById(location.hash.slice(1));
          if (el) { el.scrollIntoView(); }
        }
      })
      .catch(function () {
        document.getElementById('work-status').innerHTML =
          '<span class="empty">読み込みに失敗しました。</span>';
      });
  </script>
</body>
</html>
