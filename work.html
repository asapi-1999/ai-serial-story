<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI連載物語</title>
  <style>
    body {
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 30px 20px;
      line-height: 2.0;
      color: #2c2c2c;
      background: #fdf9f3;
    }
    .back { display: inline-block; color: #c8a96e; text-decoration: none; font-size: 0.9em; margin-bottom: 16px; }
    .back:hover { text-decoration: underline; }
    header.work { text-align: center; margin-bottom: 4px; }
    .series-label { color: #c8a96e; font-size: 0.8em; letter-spacing: 0.12em; margin: 0 0 6px; }
    h1.work-title { font-size: 1.8em; color: #5a3e1b; margin: 0; }
    .work-status { text-align: center; color: #999; font-size: 0.85em; margin: 6px 0 28px; }
    .episode-block { margin-bottom: 40px; }
    .episode { color: #c8a96e; font-size: 0.9em; margin-bottom: 4px; }
    h2.episode-title { font-size: 1.3em; border-bottom: 2px solid #c8a96e; padding-bottom: 8px; color: #5a3e1b; }
    .date { color: #999; font-size: 0.85em; margin-bottom: 14px; }
    .story { white-space: pre-wrap; font-size: 1.05em; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    rt { font-size: 0.55em; color: #666; }
    .empty { color: #999; }
  </style>
</head>
<body>
  <a class="back" href="index.html">← 作品一覧へ</a>
  <header class="work">
    <p class="series-label" id="series-label">📜 連載小説</p>
    <h1 class="work-title" id="work-title"></h1>
  </header>
  <p class="work-status" id="work-status"></p>
  <div id="episodes"></div>

  <script src="render.js"></script>
  <script>
    var TOTAL_EPISODES;

    function fetchJson(path) {
      return fetch(path, { cache: 'no-store' }).then(function (r) {
        if (!r.ok) throw new Error(path + ': HTTP ' + r.status);
        return r.json();
      });
    }

    function getParam(name) {
      var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
      return m ? decodeURIComponent(m[1]) : null;
    }

    // 作品IDは安定インデックス（?work=N）。連載中の作品は N = 完結済み作品数。
    // その作品が完結して書庫へ移っても N は変わらないため、同じURLで参照し続けられる。
    Promise.all([
      fetchJson('config.json'),
      fetchJson('bible.json'),
      fetchJson('stories.json'),
      fetchJson('library.json')
    ])
      .then(function (results) {
        var config = results[0] || {};
        var bible = results[1] || {};
        var stories = results[2] || [];
        var library = results[3] || [];
        TOTAL_EPISODES = config.total_episodes;
        if (!Number.isInteger(TOTAL_EPISODES) || TOTAL_EPISODES < 1) {
          throw new Error('config.json: total_episodes が不正です');
        }
        document.getElementById('series-label').textContent =
          '📜 全' + TOTAL_EPISODES + '話完結の連載小説';

        var currentIndex = library.length;   // 連載中の作品のインデックス
        var raw = getParam('work');
        var idx = (raw === null || raw === '') ? currentIndex : parseInt(raw, 10);
        var isCurrent = (idx === currentIndex);

        var data;
        if (isCurrent) {
          data = {
            title: bible.work_title || '無題の物語',
            episodes: stories,
            totalEpisodes: TOTAL_EPISODES
          };
        } else if (library[idx]) {
          data = {
            title: library[idx].work_title,
            episodes: library[idx].episodes || [],
            totalEpisodes: library[idx].total_episodes || (library[idx].episodes || []).length
          };
        } else {
          data = null;
        }

        if (!data || !data.episodes.length) {
          document.getElementById('work-status').innerHTML = isCurrent
            ? '<span class="empty">まだ公開されていません。次の月曜をお待ちください。</span>'
            : '<span class="empty">作品が見つかりませんでした。</span>';
          return;
        }

        document.title = stripRuby(data.title);   // タブ名はルビ記号を外した素のテキスト
        renderRuby(document.getElementById('work-title'), data.title);
        var done = data.episodes.length >= data.totalEpisodes;
        document.getElementById('work-status').textContent =
          '全' + data.totalEpisodes + '話' + (done ? '・完結' : '（第' + data.episodes.length + '話まで公開中）');

        var box = document.getElementById('episodes');
        data.episodes.forEach(function (p) {
          var blk = document.createElement('div');
          blk.className = 'episode-block';
          blk.id = 'ep' + p.episode;
          var ep = document.createElement('p');
          ep.className = 'episode';
          ep.textContent = '第' + p.episode + '話';
          var h = document.createElement('h2');
          h.className = 'episode-title';
          h.appendChild(document.createTextNode('📖 '));
          renderRuby(h, p.title);
          var d = document.createElement('p');
          d.className = 'date';
          d.textContent = '📅 ' + p.date;
          var st = document.createElement('div');
          st.className = 'story';
          renderRuby(st, p.body);        // ルビを <ruby> に変換して安全に描画
          blk.append(ep, h, d, st);
          box.appendChild(blk);
        });

        // ?work=...#epN で来た場合は該当話までスクロール
        if (location.hash) {
          var el = document.getElementById(location.hash.slice(1));
          if (el) { el.scrollIntoView(); }
        }
      })
      .catch(function () {
        document.getElementById('work-status').innerHTML =
          '<span class="empty">読み込みに失敗しました。</span>';
      });
  </script>
</body>
</html>
