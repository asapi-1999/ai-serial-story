name: AI Serial Story Generator

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

# スケジュール実行と手動実行が重なっても push が競合しないよう直列化する。
# cancel-in-progress: false で実行中はキャンセルせず、新しい実行を待たせる。
concurrency:
  group: generate-story
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Record Generation Base
        run: echo "GENERATION_BASE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Run Tests
        run: python3 -m unittest discover -s tests

      - name: Run Static Checks
        run: node tests/check_static.js

      - name: Verify Generation Base
        run: |
          git fetch origin main
          if [ "$(git rev-parse FETCH_HEAD)" != "$GENERATION_BASE_SHA" ]; then
            echo "::error::main was updated before generation. Rerun the workflow."
            exit 1
          fi

      - name: Generate Story with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 generate.py

      - name: Commit and Push
        run: |
          git fetch origin main
          if [ "$(git rev-parse FETCH_HEAD)" != "$GENERATION_BASE_SHA" ]; then
            echo "::error::main was updated during generation. Refusing to commit stale output; rerun the workflow."
            exit 1
          fi
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stories.json bible.json rss.xml library.json
          if git diff --cached --quiet; then
            echo "変更なし"
          else
            git commit -m "AI物語を自動更新 $(date '+%Y-%m-%d')"
            git push origin HEAD:main
          fi
