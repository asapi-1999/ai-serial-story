name: AI Serial Story Generator

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Story with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 generate.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add stories.json bible.json rss.xml
          git commit -m "AI物語を自動更新 $(date '+%Y-%m-%d')" || echo "変更なし"
          git push
